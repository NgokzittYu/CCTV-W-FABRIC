<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SecureLens Demo{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css?v={{ range(1, 999999) | random }}">
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen flex flex-col">

    <!-- NAV -->
    <nav class="glass-panel w-full h-14 flex items-center justify-between px-8 fixed top-0 z-50">
        <div class="flex items-center gap-2">
            <span class="w-3 h-3 rounded-full bg-red-500"></span>
            <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
            <span class="w-3 h-3 rounded-full bg-green-500"></span>
            <a href="/" class="ml-3 font-semibold text-lg tracking-tight hover:opacity-80 transition">SecureLens</a>
            <span class="text-xs text-gray-400 ml-1">Demo</span>
        </div>
        <div class="flex items-center gap-1 text-sm">
            <a href="/" class="nav-link {% if active_page == 'index' %}nav-active{% endif %}">总览</a>
            <a href="/analyze" class="nav-link {% if active_page == 'analyze' %}nav-active{% endif %}">视频分析</a>
            <a href="/detect" class="nav-link {% if active_page == 'detect' %}nav-active{% endif %}">篡改检测</a>
            <a href="/benchmark" class="nav-link {% if active_page == 'benchmark' %}nav-active{% endif %}">实验数据</a>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="pt-[72px] px-4 md:px-8 pb-8 flex-1">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center text-xs text-gray-400 py-4 border-t border-gray-100">
        SecureLens · CCTV-W-FABRIC · Blockchain Video Integrity System
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
