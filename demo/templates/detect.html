{% extends "base.html" %}
{% set active_page = "detect" %}
{% block title %}SecureLens Demo — 篡改检测{% endblock %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <h1 class="text-2xl font-bold mb-1">篡改检测</h1>
    <p class="text-sm text-gray-400 mb-6">三态验证：INTACT ✅ / RE-ENCODED ⚠️ / TAMPERED ❌</p>

    <!-- Step 1: Select Original Video -->
    <div class="card p-6 mb-6">
        <h2 class="text-base font-semibold mb-3">① 选择原始视频</h2>
        <div class="flex gap-4 items-center">
            <div class="flex-1">
                <div class="upload-zone py-6" id="origUploadZone">
                    <input type="file" id="origInput" accept="video/*" class="hidden">
                    <p class="text-sm text-gray-500">拖拽或 <span class="text-blue-500 font-medium">点击选择</span> 原始视频</p>
                </div>
            </div>
            <div class="text-gray-300 text-sm">或</div>
            <div>
                <select id="origSampleSelect" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
                    <option value="">选择示例…</option>
                </select>
            </div>
        </div>
        <div id="origSelected" class="hidden mt-3 p-2 bg-green-50 rounded-lg text-sm text-green-700 font-medium"></div>
    </div>

    <!-- Step 2: Generate or Upload Suspect -->
    <div class="card p-6 mb-6">
        <h2 class="text-base font-semibold mb-3">② 生成/上传可疑视频</h2>
        <div class="flex gap-3 flex-wrap mb-4">
            <button onclick="generateTamper('frame_replace')" class="tamper-btn px-4 py-2 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition border border-red-200">
                🔄 帧替换
            </button>
            <button onclick="generateTamper('compression')" class="tamper-btn px-4 py-2 bg-yellow-50 text-yellow-600 rounded-lg text-sm font-medium hover:bg-yellow-100 transition border border-yellow-200">
                📦 重压缩
            </button>
            <button onclick="generateTamper('noise_inject')" class="tamper-btn px-4 py-2 bg-purple-50 text-purple-600 rounded-lg text-sm font-medium hover:bg-purple-100 transition border border-purple-200">
                🌫️ 噪声注入
            </button>
            <span class="text-gray-300 text-sm self-center">或</span>
            <div>
                <div class="upload-zone py-3 px-6 inline-block" id="suspectUploadZone">
                    <input type="file" id="suspectInput" accept="video/*" class="hidden">
                    <span class="text-sm text-gray-500">上传可疑视频</span>
                </div>
            </div>
        </div>
        <div id="tamperStatus" class="hidden p-2 bg-orange-50 rounded-lg text-sm text-orange-700"></div>
    </div>

    <!-- Step 3: Detect -->
    <div class="text-center mb-6">
        <button id="detectBtn" onclick="runDetection()" disabled
            class="px-8 py-3 bg-blue-600 text-white text-base font-semibold rounded-xl hover:bg-blue-700 transition disabled:opacity-40 disabled:cursor-not-allowed shadow-lg shadow-blue-200">
            🔍 开始检测
        </button>
    </div>

    <!-- Results -->
    <div id="detectResults" class="hidden space-y-6">
        <!-- Overall Result -->
        <div id="overallResult"></div>

        <!-- Frame Comparison -->
        <div class="card p-6">
            <h2 class="text-base font-semibold mb-4">逐帧对比</h2>
            <div id="frameComparison" class="space-y-3"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/detect.js?v={{ range(1, 999999) | random }}"></script>
{% endblock %}
