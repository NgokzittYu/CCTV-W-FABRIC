version: "3.8"

# CCTV-W-FABRIC IPFS 三节点集群
# 用于模拟去中心化存储环境
#
# 启动: docker compose -f docker-compose.ipfs.yml up -d
# 停止: docker compose -f docker-compose.ipfs.yml down
# 查看状态: docker compose -f docker-compose.ipfs.yml ps

services:
  ipfs-node0:
    container_name: cctv-ipfs-node0
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"    # Swarm (P2P)
      - "5001:5001"    # API (应用连接)
      - "8080:8080"    # Gateway (HTTP 访问)
    volumes:
      - ipfs0-data:/data/ipfs
      - ipfs0-staging:/export
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ipfs-node1:
    container_name: cctv-ipfs-node1
    image: ipfs/kubo:latest
    ports:
      - "4002:4001"    # Swarm
      - "5002:5001"    # API
      - "8081:8080"    # Gateway
    volumes:
      - ipfs1-data:/data/ipfs
      - ipfs1-staging:/export
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ipfs-node2:
    container_name: cctv-ipfs-node2
    image: ipfs/kubo:latest
    ports:
      - "4003:4001"    # Swarm
      - "5003:5001"    # API
      - "8082:8080"    # Gateway
    volumes:
      - ipfs2-data:/data/ipfs
      - ipfs2-staging:/export
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  ipfs0-data:
  ipfs0-staging:
  ipfs1-data:
  ipfs1-staging:
  ipfs2-data:
  ipfs2-staging:
