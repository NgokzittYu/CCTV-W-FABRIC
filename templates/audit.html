<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>审计报告 | SecureLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background: #3B82F6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563EB;
        }

        .btn-secondary {
            background: #E5E7EB;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #D1D5DB;
        }

        .report-section {
            border-left: 3px solid #3B82F6;
            padding-left: 16px;
            margin-bottom: 24px;
        }

        .verification-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
        }

        .verified {
            background: #D1FAE5;
            color: #065F46;
        }

        .unverified {
            background: #FEE2E2;
            color: #991B1B;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass-panel w-full h-14 flex items-center justify-between px-8 fixed top-0 z-40">
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="ml-3 font-semibold text-lg tracking-tight">SecureLens</span>
            </a>
            <span class="text-gray-400">|</span>
            <span class="font-medium text-gray-700">审计报告</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/workorder" class="text-sm text-gray-600 hover:text-gray-900">工单管理</a>
            <div class="flex items-center gap-2 text-sm">
                <span class="text-gray-500">当前角色:</span>
                <select id="orgSelector" class="px-3 py-1 border border-gray-300 rounded-lg text-sm font-medium">
                    <option value="Org1MSP">Org1 - 监控方</option>
                    <option value="Org2MSP">Org2 - 监管方</option>
                    <option value="Org3MSP" selected>Org3 - 审计方</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6 max-w-7xl mx-auto">

        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">审计追踪报告</h1>
            <p class="text-sm text-gray-500 mt-1">导出和验证区块链审计轨迹</p>
        </div>

        <!-- Export Section -->
        <div class="card p-6 mb-6">
            <h2 class="text-lg font-semibold mb-4">导出审计报告</h2>
            <form id="exportForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">批次ID</label>
                        <input type="text" id="batchId" required
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                               placeholder="batch_1234567890_1234567900_xyz">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">导出格式</label>
                        <select id="exportFormat"
                                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                            <option value="json">JSON</option>
                            <option value="csv">CSV (即将支持)</option>
                            <option value="pdf">PDF (即将支持)</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button type="submit" class="btn btn-primary">
                        📥 导出报告
                    </button>
                    <button type="button" id="previewBtn" class="btn btn-secondary">
                        👁️ 预览
                    </button>
                </div>
            </form>
        </div>

        <!-- Report Preview -->
        <div id="reportPreview" class="card p-6 hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-semibold">报告预览</h2>
                <button onclick="closePreview()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="reportContent" class="space-y-6">
                <!-- Content will be populated dynamically -->
            </div>
        </div>

        <!-- Verification Section -->
        <div class="card p-6 mt-6">
            <h2 class="text-lg font-semibold mb-4">验证审计报告</h2>
            <p class="text-sm text-gray-600 mb-4">上传已导出的审计报告进行真实性验证</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">报告ID</label>
                    <input type="text" id="verifyReportId"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="audit_1234567890_abc123">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">报告签名</label>
                    <input type="text" id="verifySignature"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent font-mono text-sm"
                           placeholder="a1b2c3d4e5f6...">
                </div>
                <button onclick="verifyReport()" class="btn btn-primary">
                    ✓ 验证报告
                </button>
                <div id="verifyResult" class="hidden mt-4"></div>
            </div>
        </div>

    </main>

    <script>
        let currentOrg = 'Org3MSP';

        document.addEventListener('DOMContentLoaded', () => {
            setupEventListeners();
            loadSavedOrg();
        });

        function setupEventListeners() {
            document.getElementById('exportForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await exportAuditReport();
            });

            document.getElementById('previewBtn').addEventListener('click', async () => {
                await previewReport();
            });

            document.getElementById('orgSelector').addEventListener('change', (e) => {
                currentOrg = e.target.value;
                localStorage.setItem('currentOrg', currentOrg);
            });
        }

        function loadSavedOrg() {
            const savedOrg = localStorage.getItem('currentOrg');
            if (savedOrg) {
                currentOrg = savedOrg;
                document.getElementById('orgSelector').value = savedOrg;
            }
        }

        async function exportAuditReport() {
            const batchId = document.getElementById('batchId').value.trim();
            const format = document.getElementById('exportFormat').value;

            if (!batchId) {
                alert('请输入批次ID');
                return;
            }

            try {
                const response = await fetch(`/api/audit/export?batch_id=${encodeURIComponent(batchId)}&format=${format}`);
                const result = await response.json();

                if (result.status === 'error') {
                    alert('导出失败: ' + result.message);
                    return;
                }

                // Download the report
                const blob = new Blob([JSON.stringify(result, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `audit_report_${batchId}_${Date.now()}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('报告导出成功！');
            } catch (error) {
                alert('导出失败: ' + error.message);
            }
        }

        async function previewReport() {
            const batchId = document.getElementById('batchId').value.trim();

            if (!batchId) {
                alert('请输入批次ID');
                return;
            }

            try {
                const response = await fetch(`/api/audit/export?batch_id=${encodeURIComponent(batchId)}&format=json`);
                const result = await response.json();

                if (result.status === 'error') {
                    alert('加载失败: ' + result.message);
                    return;
                }

                renderReportPreview(result);
                document.getElementById('reportPreview').classList.remove('hidden');
            } catch (error) {
                alert('加载失败: ' + error.message);
            }
        }

        function renderReportPreview(report) {
            const content = document.getElementById('reportContent');
            const auditData = report.auditData || {};
            const batch = auditData.batch || {};
            const events = auditData.events || [];
            const rectifications = auditData.rectifications || [];

            content.innerHTML = `
                <div class="report-section">
                    <h3 class="font-semibold text-gray-900 mb-3">报告元数据</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="text-gray-500">报告ID:</span>
                            <span class="font-mono ml-2">${report.reportId || 'N/A'}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">生成时间:</span>
                            <span class="ml-2">${formatTimestamp(report.generatedAt)}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">批次ID:</span>
                            <span class="font-mono ml-2">${report.batchId || 'N/A'}</span>
                        </div>
                        <div>
                            <span class="text-gray-500">签名:</span>
                            <span class="font-mono text-xs ml-2">${(report.signature || '').substring(0, 16)}...</span>
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3 class="font-semibold text-gray-900 mb-3">批次信息</h3>
                    <div class="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Merkle Root:</span>
                            <span class="font-mono text-xs">${batch.merkleRoot || 'N/A'}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">事件数量:</span>
                            <span class="font-semibold">${batch.eventCount || 0}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">时间���口:</span>
                            <span>${formatTimestamp(batch.windowStart)} - ${formatTimestamp(batch.windowEnd)}</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">设备证书SHA256:</span>
                            <span class="font-mono text-xs">${(batch.deviceCertSha256 || '').substring(0, 16)}...</span>
                        </div>
                    </div>
                </div>

                <div class="report-section">
                    <h3 class="font-semibold text-gray-900 mb-3">证据事件 (${events.length})</h3>
                    <div class="space-y-2 max-h-64 overflow-y-auto">
                        ${events.map(event => `
                            <div class="bg-gray-50 rounded-lg p-3 text-sm">
                                <div class="flex justify-between items-start">
                                    <span class="font-mono text-xs text-gray-600">${event.id || 'N/A'}</span>
                                    <span class="text-xs text-gray-500">${event.eventType || 'N/A'}</span>
                                </div>
                                <div class="mt-1 text-xs text-gray-500">
                                    Hash: ${(event.evidenceHash || '').substring(0, 32)}...
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <div class="report-section">
                    <h3 class="font-semibold text-gray-900 mb-3">整改工单 (${rectifications.length})</h3>
                    ${rectifications.length > 0 ? `
                        <div class="space-y-2 max-h-64 overflow-y-auto">
                            ${rectifications.map(order => `
                                <div class="bg-gray-50 rounded-lg p-3 text-sm">
                                    <div class="flex justify-between items-start">
                                        <span class="font-mono text-xs text-gray-600">${order.id || 'N/A'}</span>
                                        <span class="px-2 py-1 rounded text-xs font-semibold ${getStatusClass(order.status)}">${order.status || 'N/A'}</span>
                                    </div>
                                    <div class="mt-2 text-xs text-gray-500">
                                        责任方: ${order.assignedTo || 'N/A'} | 创建: ${formatTimestamp(order.createdAt)}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    ` : '<p class="text-sm text-gray-500">无整改工单</p>'}
                </div>

                <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
                    <div class="flex items-start gap-3">
                        <svg class="w-5 h-5 text-blue-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                        <div class="text-sm text-blue-800">
                            <p class="font-semibold mb-1">验证信息</p>
                            <p>此报告包含完整的区块链审计轨迹，可通过报告ID和签名进行真实性验证。</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function verifyReport() {
            const reportId = document.getElementById('verifyReportId').value.trim();
            const signature = document.getElementById('verifySignature').value.trim();
            const resultDiv = document.getElementById('verifyResult');

            if (!reportId || !signature) {
                alert('请输入报告ID和签名');
                return;
            }

            // Mock verification for demonstration
            const isValid = signature.length > 32; // Simple mock validation

            resultDiv.innerHTML = isValid ? `
                <div class="verification-badge verified">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                    <span>报告验证通过</span>
                </div>
                <p class="text-sm text-gray-600 mt-2">报告签名有效，数据未被篡改。</p>
            ` : `
                <div class="verification-badge unverified">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                    <span>验证失败</span>
                </div>
                <p class="text-sm text-gray-600 mt-2">报告签名无效或数据已被篡改。</p>
            `;

            resultDiv.classList.remove('hidden');
        }

        function closePreview() {
            document.getElementById('reportPreview').classList.add('hidden');
        }

        function formatTimestamp(ts) {
            if (!ts) return 'N/A';
            const date = new Date(ts * 1000);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getStatusClass(status) {
            const classes = {
                'OPEN': 'bg-yellow-100 text-yellow-800',
                'SUBMITTED': 'bg-blue-100 text-blue-800',
                'CONFIRMED': 'bg-green-100 text-green-800',
                'REJECTED': 'bg-red-100 text-red-800'
            };
            return classes[status] || 'bg-gray-100 text-gray-800';
        }
    </script>

</body>
</html>
