<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工单管理 | SecureLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-open { background: #FEF3C7; color: #92400E; }
        .status-submitted { background: #DBEAFE; color: #1E40AF; }
        .status-confirmed { background: #D1FAE5; color: #065F46; }
        .status-rejected { background: #FEE2E2; color: #991B1B; }

        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
        }

        .btn-primary {
            background: #3B82F6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563EB;
        }

        .btn-secondary {
            background: #E5E7EB;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #D1D5DB;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass-panel w-full h-14 flex items-center justify-between px-8 fixed top-0 z-40">
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="ml-3 font-semibold text-lg tracking-tight">SecureLens</span>
            </a>
            <span class="text-gray-400">|</span>
            <span class="font-medium text-gray-700">工单管理</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/audit" id="auditLink" class="text-sm text-gray-600 hover:text-gray-900" style="display: none;">审计报告</a>
            <div class="flex items-center gap-2 text-sm">
                <span class="text-gray-500">当前角色:</span>
                <select id="orgSelector" class="px-3 py-1 border border-gray-300 rounded-lg text-sm font-medium">
                    <option value="Org1MSP">Org1 - 监控方</option>
                    <option value="Org2MSP" selected>Org2 - 监管方</option>
                    <option value="Org3MSP">Org3 - 审计方</option>
                </select>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6">

        <!-- Header -->
        <div class="mb-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">整改工单管理</h1>
                <p class="text-sm text-gray-500 mt-1">违规事件整改流程跟踪与管理</p>
            </div>
            <button id="createWorkorderBtn" class="btn btn-primary">
                <span>+ 创建工单</span>
            </button>
        </div>

        <!-- Filters -->
        <div class="card p-4 mb-6">
            <div class="flex gap-4 items-center flex-wrap">
                <div class="flex items-center gap-2">
                    <label class="text-sm font-medium text-gray-700">状态筛选:</label>
                    <select id="statusFilter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">全部</option>
                        <option value="OPEN">待整改</option>
                        <option value="SUBMITTED">待确认</option>
                        <option value="CONFIRMED">已关闭</option>
                        <option value="REJECTED">已驳回</option>
                    </select>
                </div>
                <div class="flex items-center gap-2">
                    <label class="text-sm font-medium text-gray-700">搜索:</label>
                    <input type="text" id="searchInput" placeholder="工单ID或违规ID"
                           class="px-3 py-2 border border-gray-300 rounded-lg text-sm w-64">
                </div>
                <button id="refreshBtn" class="btn btn-secondary ml-auto">
                    <span>🔄 刷新</span>
                </button>
            </div>
        </div>

        <!-- Workorder List -->
        <div class="card p-6">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-200">
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">工单ID</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">违规批次ID</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">责任组织</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">状态</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">创建时间</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">截止时间</th>
                            <th class="text-left py-3 px-4 text-sm font-semibold text-gray-700">操作</th>
                        </tr>
                    </thead>
                    <tbody id="workorderTableBody">
                        <tr>
                            <td colspan="7" class="text-center py-8 text-gray-400">
                                <div class="flex flex-col items-center gap-2">
                                    <svg class="w-12 h-12 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                                    </svg>
                                    <span>暂无工单数据</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- Create Workorder Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">创建整改工单</h2>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="createWorkorderForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">违规批次ID</label>
                    <input type="text" id="violationId" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="batch_1234567890_1234567900_xyz">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">整改要求描述</label>
                    <textarea id="description" required rows="4"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              placeholder="请详细描述整改要求..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">责任组织</label>
                    <select id="assignedOrg" required
                            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        <option value="">请选择</option>
                        <option value="Org1MSP">Org1 - 监控方</option>
                        <option value="Org2MSP">Org2 - 监管方</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">截止日期</label>
                    <input type="datetime-local" id="deadline" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 btn btn-primary">创建工单</button>
                    <button type="button" onclick="closeCreateModal()" class="flex-1 btn btn-secondary">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Workorder Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">工单详情</h2>
                <button onclick="closeDetailModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="detailContent" class="space-y-4">
                <!-- Content will be populated dynamically -->
            </div>
        </div>
    </div>

    <!-- Submit Rectification Modal -->
    <div id="submitModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">提交整改证明</h2>
                <button onclick="closeSubmitModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="submitRectificationForm" class="space-y-4">
                <input type="hidden" id="submitOrderId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">整改证明</label>
                    <textarea id="rectificationProof" required rows="6"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              placeholder="请详细说明整改措施和结果..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">附件链接（可选）</label>
                    <input type="text" id="attachments"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                           placeholder="https://example.com/evidence.pdf">
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="submit" class="flex-1 btn btn-primary">提交整改</button>
                    <button type="button" onclick="closeSubmitModal()" class="flex-1 btn btn-secondary">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">确认整改</h2>
                <button onclick="closeConfirmModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <form id="confirmRectificationForm" class="space-y-4">
                <input type="hidden" id="confirmOrderId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">审核意见</label>
                    <textarea id="confirmComments" required rows="4"
                              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                              placeholder="请填写审核意见..."></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="confirmWorkorder(true)" class="flex-1 btn" style="background: #10B981; color: white;">
                        ✓ 通过
                    </button>
                    <button type="button" onclick="confirmWorkorder(false)" class="flex-1 btn" style="background: #EF4444; color: white;">
                        ✗ 驳回
                    </button>
                    <button type="button" onclick="closeConfirmModal()" class="flex-1 btn btn-secondary">取消</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentOrg = 'Org2MSP';
        let workorders = [];

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadWorkorders();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('orgSelector').addEventListener('change', (e) => {
                currentOrg = e.target.value;
                loadWorkorders();
                updateUIPermissions();
            });

            document.getElementById('createWorkorderBtn').addEventListener('click', () => {
                document.getElementById('createModal').classList.add('active');
            });

            document.getElementById('createWorkorderForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await createWorkorder();
            });

            document.getElementById('submitRectificationForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await submitRectification();
            });

            document.getElementById('statusFilter').addEventListener('change', filterWorkorders);
            document.getElementById('searchInput').addEventListener('input', filterWorkorders);
            document.getElementById('refreshBtn').addEventListener('click', loadWorkorders);
        }

        function updateUIPermissions() {
            const createBtn = document.getElementById('createWorkorderBtn');
            const auditLink = document.getElementById('auditLink');

            // Only Org2 can create workorders
            createBtn.style.display = currentOrg === 'Org2MSP' ? 'block' : 'none';

            // Only Org3 can access audit reports
            auditLink.style.display = currentOrg === 'Org3MSP' ? 'inline-block' : 'none';
        }

        async function loadWorkorders() {
            try {
                // Mock data for demonstration
                workorders = [
                    {
                        id: 'order_1709568000000_abc123',
                        batchId: 'batch_1709568000_1709568600_xyz',
                        assignedTo: 'Org1MSP',
                        status: 'OPEN',
                        createdAt: 1709568000,
                        deadline: 1710172800,
                        history: [
                            { at: 1709568000, byMsp: 'Org2MSP', action: 'CREATE', comment: '发现违规行为，需要整改' }
                        ]
                    }
                ];

                renderWorkorders(workorders);
            } catch (error) {
                console.error('Failed to load workorders:', error);
                alert('加载工单失败: ' + error.message);
            }
        }

        function renderWorkorders(orders) {
            const tbody = document.getElementById('workorderTableBody');

            if (orders.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-8 text-gray-400">暂无工单数据</td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = orders.map(order => {
                const isOverdue = order.deadline > 0 && Date.now() / 1000 > order.deadline && order.status === 'OPEN';
                const statusClass = `status-${order.status.toLowerCase()}`;
                const statusText = {
                    'OPEN': '待整改',
                    'SUBMITTED': '待确认',
                    'CONFIRMED': '已关闭',
                    'REJECTED': '已驳回'
                }[order.status] || order.status;

                return `
                    <tr class="border-b border-gray-100 hover:bg-gray-50">
                        <td class="py-3 px-4 text-sm font-mono">${order.id}</td>
                        <td class="py-3 px-4 text-sm font-mono">${order.batchId}</td>
                        <td class="py-3 px-4 text-sm">${order.assignedTo}</td>
                        <td class="py-3 px-4">
                            <span class="status-badge ${statusClass}">${statusText}</span>
                            ${isOverdue ? '<span class="ml-2 text-xs text-red-600">⚠️ 已超期</span>' : ''}
                        </td>
                        <td class="py-3 px-4 text-sm">${formatTimestamp(order.createdAt)}</td>
                        <td class="py-3 px-4 text-sm">${order.deadline > 0 ? formatTimestamp(order.deadline) : '-'}</td>
                        <td class="py-3 px-4">
                            <div class="flex gap-2">
                                <button onclick="viewDetail('${order.id}')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                                    查看
                                </button>
                                ${getActionButtons(order)}
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        function getActionButtons(order) {
            let buttons = '';

            // Org1 can submit rectification
            if (currentOrg === 'Org1MSP' && (order.status === 'OPEN' || order.status === 'REJECTED')) {
                buttons += `<button onclick="openSubmitModal('${order.id}')" class="text-green-600 hover:text-green-800 text-sm font-medium">提交整改</button>`;
            }

            // Org2 can confirm/reject
            if (currentOrg === 'Org2MSP' && order.status === 'SUBMITTED') {
                buttons += `<button onclick="openConfirmModal('${order.id}')" class="text-purple-600 hover:text-purple-800 text-sm font-medium">审核</button>`;
            }

            return buttons;
        }

        function filterWorkorders() {
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = workorders;

            if (status) {
                filtered = filtered.filter(w => w.status === status);
            }

            if (search) {
                filtered = filtered.filter(w =>
                    w.id.toLowerCase().includes(search) ||
                    w.batchId.toLowerCase().includes(search)
                );
            }

            renderWorkorders(filtered);
        }

        async function createWorkorder() {
            const violationId = document.getElementById('violationId').value;
            const description = document.getElementById('description').value;
            const assignedOrg = document.getElementById('assignedOrg').value;
            const deadlineInput = document.getElementById('deadline').value;
            const deadline = new Date(deadlineInput).getTime() / 1000;

            try {
                const response = await fetch('/api/workorder/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        violationId,
                        description,
                        assignedOrg,
                        deadline
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('工单创建成功！');
                    closeCreateModal();
                    loadWorkorders();
                } else {
                    alert('创建失败: ' + result.message);
                }
            } catch (error) {
                alert('创建失败: ' + error.message);
            }
        }

        async function submitRectification() {
            const orderId = document.getElementById('submitOrderId').value;
            const rectificationProof = document.getElementById('rectificationProof').value;
            const attachments = document.getElementById('attachments').value;

            try {
                const response = await fetch(`/api/workorder/${orderId}/rectify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        rectificationProof,
                        attachments: attachments ? [attachments] : []
                    })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('整改提交成功！');
                    closeSubmitModal();
                    loadWorkorders();
                } else {
                    alert('提交失败: ' + result.message);
                }
            } catch (error) {
                alert('提交失败: ' + error.message);
            }
        }

        async function confirmWorkorder(approved) {
            const orderId = document.getElementById('confirmOrderId').value;
            const comments = document.getElementById('confirmComments').value;

            try {
                const response = await fetch(`/api/workorder/${orderId}/confirm`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ approved, comments })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert(approved ? '整改已通过！' : '整改已驳回！');
                    closeConfirmModal();
                    loadWorkorders();
                } else {
                    alert('操作失败: ' + result.message);
                }
            } catch (error) {
                alert('操作失败: ' + error.message);
            }
        }

        function viewDetail(orderId) {
            const order = workorders.find(w => w.id === orderId);
            if (!order) return;

            const content = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-xs text-gray-500 mb-1">工单ID</p>
                            <p class="font-mono text-sm">${order.id}</p>
                        </div>
                        <div>
                            <p class="text-xs text-gray-500 mb-1">状态</p>
                            <span class="status-badge status-${order.status.toLowerCase()}">${order.status}</span>
                        </div>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">违规批次ID</p>
                        <p class="font-mono text-sm">${order.batchId}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">责任组织</p>
                        <p class="text-sm">${order.assignedTo}</p>
                    </div>
                    <div>
                        <p class="text-xs text-gray-500 mb-2">状态流转历史</p>
                        <div class="space-y-2">
                            ${order.history.map(h => `
                                <div class="border-l-2 border-blue-500 pl-3 py-1">
                                    <p class="text-sm font-medium">${h.action} - ${h.byMsp}</p>
                                    <p class="text-xs text-gray-500">${formatTimestamp(h.at)}</p>
                                    <p class="text-sm text-gray-700 mt-1">${h.comment}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('detailContent').innerHTML = content;
            document.getElementById('detailModal').classList.add('active');
        }

        function openSubmitModal(orderId) {
            document.getElementById('submitOrderId').value = orderId;
            document.getElementById('submitModal').classList.add('active');
        }

        function openConfirmModal(orderId) {
            document.getElementById('confirmOrderId').value = orderId;
            document.getElementById('confirmModal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
            document.getElementById('createWorkorderForm').reset();
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function closeSubmitModal() {
            document.getElementById('submitModal').classList.remove('active');
            document.getElementById('submitRectificationForm').reset();
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
            document.getElementById('confirmRectificationForm').reset();
        }

        function formatTimestamp(ts) {
            if (!ts) return '-';
            const date = new Date(ts * 1000);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        updateUIPermissions();
    </script>

</body>
</html>
