<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 | SecureLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #F5F5F7;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 24px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background-color: #3B82F6;
        }

        input:checked + .toggle-slider:before {
            transform: translateX(24px);
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigation -->
    <nav class="glass-panel w-full h-14 flex items-center justify-between px-8 fixed top-0 z-40">
        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2">
                <span class="w-3 h-3 rounded-full bg-red-500"></span>
                <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                <span class="w-3 h-3 rounded-full bg-green-500"></span>
                <span class="ml-3 font-semibold text-lg tracking-tight">SecureLens</span>
            </a>
            <span class="text-gray-400">|</span>
            <span class="font-medium text-gray-700">系统配置</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="/workorder" class="text-sm text-gray-600 hover:text-gray-900">工单管理</a>
            <a href="/audit" class="text-sm text-gray-600 hover:text-gray-900">审计报告</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-20 px-6 pb-6 max-w-5xl mx-auto">

        <!-- Header -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900">系统配置</h1>
            <p class="text-sm text-gray-500 mt-1">管理自动触发工单和系统行为</p>
        </div>

        <!-- Auto Workorder Config -->
        <div class="card p-6 mb-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-semibold">自动触发工单</h2>
                    <p class="text-sm text-gray-500 mt-1">当检测到违规事件时自动创建整改工单</p>
                </div>
                <label class="toggle-switch">
                    <input type="checkbox" id="autoWorkorderToggle">
                    <span class="toggle-slider"></span>
                </label>
            </div>

            <div id="rulesSection" class="space-y-4">
                <h3 class="text-sm font-semibold text-gray-700 mb-3">触发规则</h3>
                <div id="rulesList" class="space-y-3">
                    <!-- Rules will be populated here -->
                </div>
                <button onclick="addRule()" class="text-sm text-blue-600 hover:text-blue-800 font-medium">
                    + 添加规则
                </button>
            </div>

            <div class="mt-6 pt-6 border-t border-gray-200">
                <button onclick="saveConfig()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                    保存配置
                </button>
            </div>
        </div>

        <!-- Statistics -->
        <div class="card p-6">
            <h2 class="text-lg font-semibold mb-4">统计信息</h2>
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-blue-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">自动创建工单数</p>
                    <p class="text-2xl font-bold text-blue-600 mt-1">0</p>
                </div>
                <div class="bg-green-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">已完成工单</p>
                    <p class="text-2xl font-bold text-green-600 mt-1">0</p>
                </div>
                <div class="bg-yellow-50 rounded-lg p-4">
                    <p class="text-sm text-gray-600">待处理工单</p>
                    <p class="text-2xl font-bold text-yellow-600 mt-1">0</p>
                </div>
            </div>
        </div>

    </main>

    <script>
        let config = {
            enabled: true,
            rules: []
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
        });

        async function loadConfig() {
            try {
                const response = await fetch('/api/config/auto-workorder');
                const result = await response.json();

                if (result.status === 'success') {
                    config = result.config;
                    document.getElementById('autoWorkorderToggle').checked = config.enabled;
                    renderRules();
                }
            } catch (error) {
                console.error('Failed to load config:', error);
            }
        }

        function renderRules() {
            const container = document.getElementById('rulesList');

            if (config.rules.length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-500">暂无规则，点击下方添加</p>';
                return;
            }

            container.innerHTML = config.rules.map((rule, index) => `
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">违规等级</label>
                            <select onchange="updateRule(${index}, 'violation_level', this.value)"
                                    class="w-full px-2 py-1 border border-gray-300 rounded text-sm">
                                <option value="high" ${rule.violation_level === 'high' ? 'selected' : ''}>高</option>
                                <option value="critical" ${rule.violation_level === 'critical' ? 'selected' : ''}>严重</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">责任组织</label>
                            <select onchange="updateRule(${index}, 'auto_assign_org', this.value)"
                                    class="w-full px-2 py-1 border border-gray-300 rounded text-sm">
                                <option value="Org1MSP" ${rule.auto_assign_org === 'Org1MSP' ? 'selected' : ''}>Org1</option>
                                <option value="Org2MSP" ${rule.auto_assign_org === 'Org2MSP' ? 'selected' : ''}>Org2</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-600 mb-1">截止天数</label>
                            <input type="number" value="${rule.default_deadline_days}"
                                   onchange="updateRule(${index}, 'default_deadline_days', parseInt(this.value))"
                                   class="w-full px-2 py-1 border border-gray-300 rounded text-sm">
                        </div>
                    </div>
                    <button onclick="removeRule(${index})" class="mt-2 text-xs text-red-600 hover:text-red-800">
                        删除规则
                    </button>
                </div>
            `).join('');
        }

        function addRule() {
            config.rules.push({
                violation_level: 'high',
                auto_assign_org: 'Org1MSP',
                default_deadline_days: 7
            });
            renderRules();
        }

        function removeRule(index) {
            config.rules.splice(index, 1);
            renderRules();
        }

        function updateRule(index, field, value) {
            config.rules[index][field] = value;
        }

        async function saveConfig() {
            config.enabled = document.getElementById('autoWorkorderToggle').checked;

            try {
                const response = await fetch('/api/config/auto-workorder', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('配置保存成功！');
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }
    </script>

</body>
</html>
